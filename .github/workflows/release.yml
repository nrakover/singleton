name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.94.0 --profile minimal

      - name: Build singleton
        run: cargo +1.94.0 build --locked --release -p singleton-cli --bin singleton --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          package="singleton-${{ matrix.target }}"
          package_dir="singleton-${version}-${{ matrix.target }}"
          mkdir -p "dist/${package_dir}"
          cp "target/${{ matrix.target }}/release/singleton" "dist/${package_dir}/"
          cp README.md "dist/${package_dir}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package_dir}"
          (cd dist && shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: singleton-${{ matrix.target }}
          path: dist/*.tar.gz*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
